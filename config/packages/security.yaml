security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: app_user_provider
            json_login:
                check_path: app_api_login
                username_path: email
                password_path: password

            logout:
                path: app_api_logout

    access_control:
        # On autorise tout le monde à accéder aux routes de recherche publique
        - { path: ^/api/public, roles: PUBLIC_ACCESS }