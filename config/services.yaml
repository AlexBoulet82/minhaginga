parameters:
    # Ce paramètre définit le chemin vers ton dossier public/uploads/photos
    photos_directory: '%kernel.project_dir%/public/uploads/photos'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # On configure notre FileUploader pour qu'il injecte automatiquement le bon dossier
    App\Service\FileUploader:
        arguments:
            $targetDirectory: '%photos_directory%'